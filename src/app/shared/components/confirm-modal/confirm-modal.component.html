@if (isOpen) {
	<div class="fixed inset-0 z-50 flex items-center justify-center">
		<div class="absolute inset-0 bg-black/50" (click)="onCancel()"></div>
		
		<div class="relative bg-white rounded-2xl shadow-xl max-w-md w-full mx-4 p-6">
			<div class="flex flex-col items-center text-center">
				<div 
					class="w-14 h-14 rounded-full flex items-center justify-center mb-4"
					[class]="iconColorClasses"
				>
					<svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconPath"/>
					</svg>
				</div>
				
				<h2 class="text-xl font-bold text-text mb-2">{{ title }}</h2>
				<p class="text-text-secondary mb-6">{{ message }}</p>
				
				<div class="flex gap-3 w-full">
					<button 
						(click)="onCancel()"
						appButton="outline"
						size="lg"
						class="flex-1"
					>
						{{ cancelText }}
					</button>
					<button 
						(click)="onConfirm()"
						[appButton]="type"
						size="lg"
						class="flex-1"
					>
						{{ confirmText }}
					</button>
				</div>
			</div>
		</div>
	</div>
}
