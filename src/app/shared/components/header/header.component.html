<header class="bg-white shadow-sm">
	<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
		<a routerLink="/" class="flex items-center gap-2">
			<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
				<span class="text-white font-bold text-xl">B</span>
			</div>
			<span class="text-xl font-bold text-text">BTG Fondos</span>
		</a>

		@if (showLogin) {
			<a
				routerLink="/dashboard"
				class="px-6 py-2.5 bg-primary text-white font-medium rounded-lg hover:opacity-90 transition-opacity"
			>
				Iniciar Sesión
			</a>
		} @else {
			<div class="flex items-center gap-3">
				<div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
					<span class="text-primary font-semibold">{{ displayName.charAt(0).toUpperCase() }}</span>
				</div>
				<span class="text-text font-medium">{{ displayName }}</span>
			</div>
		}
	</div>
</header>
