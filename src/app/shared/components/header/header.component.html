<header class="bg-white shadow-sm">
	<div class="mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
		<div class="flex items-center gap-3">
			@if (showMenuButton) {
				<button 
					(click)="onMenuClick()"
					class="md:hidden p-2 text-text-secondary hover:text-text hover:bg-background rounded-lg transition-colors"
				>
					<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
						<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
					</svg>
				</button>
			}
			<a routerLink="/" class="flex items-center gap-2">
				<div class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center">
					<span class="text-white font-bold text-xl">B</span>
				</div>
				<span class="text-xl font-bold text-text">BTG Fondos</span>
			</a>
		</div>

		@if (showLogin) {
			<a
				routerLink="/dashboard"
				class="px-6 py-2.5 bg-primary text-white font-medium rounded-lg hover:opacity-90 transition-opacity"
			>
				Empezar a usar
			</a>
		} @else {
			<div class="flex items-center gap-2 sm:gap-4">
				@if (userBalance !== null) {
					<div class="flex items-center gap-1 sm:gap-2 px-2 sm:px-4 py-1.5 sm:py-2 bg-primary/5 rounded-lg">
						<svg class="w-4 h-4 sm:w-5 sm:h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
							<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
						</svg>
						<span class="text-primary font-semibold text-sm sm:text-base">{{ userBalance | currency:'COP':'symbol-narrow':'1.0-0' }}</span>
					</div>
				}
				<div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center">
					<span class="text-primary font-semibold">{{ displayName.charAt(0).toUpperCase() }}</span>
				</div>
			</div>
		}
	</div>
</header>
