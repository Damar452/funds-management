<app-data-table [columns]="columns" [data]="funds" trackBy="id" emptyMessage="No hay fondos disponibles">
	<ng-template #rowTemplate let-fund>
		<td class="px-6 py-4">
			<span 
				class="px-3 py-1 text-xs font-medium rounded-full"
				[class]="fund.category === 'FPV' ? 'bg-primary/10 text-primary' : 'bg-accent/10 text-accent'"
			>
				{{ fund.category }}
			</span>
		</td>
		<td class="px-6 py-4 text-sm font-medium text-text">{{ fund.name }}</td>
		<td class="px-6 py-4 text-sm text-text-secondary max-w-xs truncate">{{ fund.description }}</td>
		<td class="px-6 py-4 text-sm font-semibold text-text">{{ fund.minAmount | currency:'COP':'symbol-narrow':'1.0-0' }}</td>
		<td class="px-6 py-4">
			<button 
				(click)="onSubscribe(fund)"
				[disabled]="isSubscribed(fund.id)"
				class="px-4 py-2 text-sm font-medium rounded-lg transition-opacity"
				[class]="isSubscribed(fund.id) ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-primary text-white hover:opacity-90'"
			>
				{{ isSubscribed(fund.id) ? 'Suscrito' : 'Suscribirse' }}
			</button>
		</td>
	</ng-template>
</app-data-table>
