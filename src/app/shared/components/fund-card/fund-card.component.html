<div class="bg-white p-4 sm:p-6 rounded-xl shadow-sm hover:shadow-md transition-shadow">
	<div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
		<div class="flex-1 min-w-0">
			<div class="flex items-center gap-2 sm:gap-3 mb-2 flex-wrap">
				<span 
					class="px-2 sm:px-3 py-1 text-xs font-medium rounded-full flex-shrink-0"
					[class]="fund.category === 'FPV' ? 'bg-primary/10 text-primary' : 'bg-accent/10 text-accent'"
				>
					{{ fund.category }}
				</span>
				<h3 class="text-base sm:text-lg font-semibold text-text break-words">{{ fund.name }}</h3>
			</div>
			<p class="text-text-secondary text-sm mb-3">{{ fund.description }}</p>
			<div class="flex items-center gap-2 sm:gap-4 text-sm">
				<span class="text-text-secondary">Monto mínimo:</span>
				<span class="font-semibold text-text">{{ fund.minAmount | currency:'COP':'symbol-narrow':'1.0-0' }}</span>
			</div>
		</div>
		<button 
			(click)="onSubscribe()"
			[disabled]="isSubscribed"
			class="w-full sm:w-auto px-4 py-2 text-sm font-medium rounded-lg transition-opacity flex-shrink-0"
			[class]="isSubscribed ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-primary text-white hover:opacity-90'"
		>
			{{ isSubscribed ? 'Suscrito' : 'Suscribirse' }}
		</button>
	</div>
</div>
