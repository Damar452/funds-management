<div class="bg-white p-6 rounded-xl shadow-sm hover:shadow-md transition-shadow">
	<div class="flex items-start justify-between">
		<div class="flex-1">
			<div class="flex items-center gap-3 mb-2">
				<span 
					class="px-3 py-1 text-xs font-medium rounded-full"
					[class]="fund.category === 'FPV' ? 'bg-primary/10 text-primary' : 'bg-accent/10 text-accent'"
				>
					{{ fund.category }}
				</span>
				<h3 class="text-lg font-semibold text-text">{{ fund.name }}</h3>
			</div>
			<p class="text-text-secondary text-sm mb-3">{{ fund.description }}</p>
			<div class="flex items-center gap-4 text-sm">
				<span class="text-text-secondary">Monto mínimo:</span>
				<span class="font-semibold text-text">{{ fund.minAmount | currency:'COP':'symbol-narrow':'1.0-0' }}</span>
			</div>
		</div>
		<button 
			(click)="onSubscribe()"
			[disabled]="isSubscribed"
			class="px-4 py-2 text-sm font-medium rounded-lg transition-opacity"
			[class]="isSubscribed ? 'bg-gray-200 text-gray-500 cursor-not-allowed' : 'bg-primary text-white hover:opacity-90'"
		>
			{{ isSubscribed ? 'Suscrito' : 'Suscribirse' }}
		</button>
	</div>
</div>
