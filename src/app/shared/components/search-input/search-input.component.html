<div class="relative">
	<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
		<svg class="w-5 h-5 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
			<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
		</svg>
	</div>
	<input
		type="text"
		[(ngModel)]="searchTerm"
		(ngModelChange)="onSearch()"
		[placeholder]="placeholder"
		class="w-full pl-10 pr-10 py-2.5 bg-white border border-gray-200 rounded-lg text-text placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors"
	/>
	@if (searchTerm) {
		<button
			(click)="onClear()"
			class="absolute inset-y-0 right-0 pr-3 flex items-center text-text-secondary hover:text-text"
		>
			<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
				<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
			</svg>
		</button>
	}
</div>
