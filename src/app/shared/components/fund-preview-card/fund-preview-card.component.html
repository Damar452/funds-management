<div class="bg-white p-6 rounded-2xl shadow-lg">
	<div class="flex items-center gap-3 mb-4">
		<span class="px-3 py-1 text-sm font-medium rounded-full" [ngClass]="categoryColorClass">{{ category }}</span>
		<span class="text-text-secondary text-sm">{{ categoryLabel }}</span>
	</div>
	<h3 class="text-lg font-semibold text-text mb-2">{{ title }}</h3>
	<p class="text-text-secondary text-sm mb-4">{{ description }}</p>
	<div class="flex items-center justify-between text-sm">
		<span class="text-text-secondary">Desde</span>
		<span class="font-semibold" [ngClass]="amountColorClass">{{ formattedAmount }}</span>
	</div>
</div>
